<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>启航塑胶·工程塑料数据库</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .contact { background: #11998e; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; }
        .search-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 25px; }
        .search-results { margin-top: 15px; }
        .result-item { padding: 8px; border-bottom: 1px solid #eee; }
        .result-item a { color: #667eea; text-decoration: none; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; text-align: center; border-radius: 10px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; }
        .material-link { display: inline-block; background: #e0e0e0; padding: 5px 10px; margin: 3px; border-radius: 15px; text-decoration: none; color: #333; font-size: 12px; }
        .footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏭 启航塑胶 · 工程塑料数据库</h1>
        <p>官方发布 | 结构化JSON数据 | 74个牌号</p>
    </div>

    <div class="contact">
        <span>📞 联系人：Shirly</span>
        <span>📱 电话：18925440603</span>
        <span>📧 邮箱：13188269@qq.com</span>
        <span>💬 微信：18925440603</span>
    </div>

    <div class="search-box">
        <h3>🔍 快速搜索牌号</h3>
        <input type="text" id="searchInput" placeholder="输入牌号，如 ZA02111, M90-44..." onkeyup="searchGrade()">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-number">74</div><div>牌号总数</div></div>
        <div class="stat-card"><div class="stat-number">4</div><div>材料类型</div></div>
        <div class="stat-card"><div class="stat-number">3</div><div>代理品牌</div></div>
        <div class="stat-card"><div class="stat-number">✅</div><div>代理证书</div></div>
    </div>

    <div class="grid">
        <div class="card"><h2>🔧 ABS (22个)</h2><div id="abs-list">加载中...</div></div>
        <div class="card"><h2>⚙️ POM (13个)</h2><div id="pom-list">加载中...</div></div>
        <div class="card"><h2>🔬 PMMA (18个)</h2><div id="pmma-list">加载中...</div></div>
        <div class="card"><h2>💻 PC (21个)</h2><div id="pc-list">加载中...</div></div>
    </div>

    <div class="footer">
        <p>东莞市启航塑胶有限公司 · 数据最后更新：2026-05-31</p>
        <p>代理品牌：日本大赛路 | 日本T-UMG | 德国恩信格</p>
    </div>

    <script>
        async function loadList(material, elementId) {
            const url = `https://api.github.com/repos/MORES121/polymer-datahub/contents/data/${material}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (Array.isArray(data)) {
                    const html = data.filter(f => f.name.endsWith('.json'))
                        .map(f => `<a href="${f.download_url}" class="material-link" target="_blank">${f.name.replace('.json', '')}</a>`).join('');
                    document.getElementById(elementId).innerHTML = html || '暂无';
                }
            } catch(e) { document.getElementById(elementId).innerHTML = '加载失败'; }
        }

        let allMaterials = [];
        async function loadAll() {
            const mats = ['ABS', 'POM', 'PMMA', 'PC'];
            for (const m of mats) {
                const url = `https://api.github.com/repos/MORES121/polymer-datahub/contents/data/${m}`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        data.filter(f => f.name.endsWith('.json')).forEach(f => {
                            allMaterials.push({ name: f.name.replace('.json', ''), material: m, url: f.download_url });
                        });
                    }
                } catch(e) {}
            }
        }

        function searchGrade() {
            const kw = document.getElementById('searchInput').value.trim().toLowerCase();
            const div = document.getElementById('searchResults');
            if (kw.length < 2) { div.innerHTML = ''; return; }
            const results = allMaterials.filter(m => m.name.toLowerCase().includes(kw));
            if (results.length === 0) { div.innerHTML = '<div class="result-item">未找到匹配的牌号</div>'; return; }
            div.innerHTML = results.map(r => `<div class="result-item"><a href="${r.url}" target="_blank">${r.name}</a> <span style="color:#999">${r.material}</span></div>`).join('');
        }

        loadList('ABS', 'abs-list');
        loadList('POM', 'pom-list');
        loadList('PMMA', 'pmma-list');
        loadList('PC', 'pc-list');
        loadAll();
    </script>
</body>
</html>
